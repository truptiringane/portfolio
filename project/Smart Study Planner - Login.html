
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Study Planner - Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#d9f2ff,#fef6ff,#fff7e6);
    padding:20px;
}

/* Main Container */
.container{
    width:950px;
    height:620px;
    background:rgba(255,255,255,.95);
    border-radius:25px;
    display:flex;
    overflow:hidden;
    box-shadow:0 25px 60px rgba(0,0,0,.18);
}

/* Left Panel */
.left{
    width:42%;
    background:linear-gradient(180deg,#fff5fa,#eef6ff);
    position:relative;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.left::before{
    content:"";
    width:260px;
    height:260px;
    position:absolute;
    left:-90px;
    bottom:80px;
    border-radius:50%;
    background:linear-gradient(135deg,#ffd9ea,#d8e8ff);
}

/* Logo */
.logo{
    position:absolute;
    top:25px;
    left:25px;
    display:flex;
    align-items:center;
    gap:12px;
    z-index:2;
}

.logo-icon{
    width:45px;
    height:45px;
    background:linear-gradient(135deg,#063a8d,#2563eb);
    border-radius:12px;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:20px;
    box-shadow:0 8px 18px rgba(37,99,235,.35);
}

.logo-text h3{
    color:#0f2f66;
    font-size:17px;
}

.logo-text p{
    color:#777;
    font-size:11px;
}

/* Illustration */
.image{
    z-index:2;
}

.image img{
    width:260px;
    max-width:100%;
    filter:drop-shadow(0 15px 25px rgba(0,0,0,.18));
    animation:float 3s ease-in-out infinite;
}

@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0);}
}

.left h2{
    margin-top:15px;
    color:#123e8b;
    z-index:2;
}

.left p{
    width:75%;
    text-align:center;
    color:#666;
    margin-top:8px;
    z-index:2;
}

/* Right Panel */
.right{
    width:58%;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Login Card */
.card{
    width:390px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,.12);
}

.card h1{
    color:#0f2f66;
    font-size:32px;
}

.subtitle{
    color:#666;
    margin:10px 0 25px;
    font-size:14px;
}

/* Input Fields */
.input-box{
    margin-bottom:18px;
}

.input-box label{
    display:block;
    margin-bottom:8px;
    font-size:13px;
    font-weight:600;
}

.input-box input{
    width:100%;
    height:45px;
    border:1px solid #ddd;
    border-radius:10px;
    padding:0 15px;
    outline:none;
    transition:.3s;
}

.input-box input:hover{
    border-color:#90b4ff;
    background:#fafcff;
}

.input-box input:focus{
    border-color:#1e5eff;
    box-shadow:0 0 12px rgba(30,94,255,.25);
    transform:translateY(-2px);
}

/* Password Icon */
.password{
    position:relative;
}

.password i{
    position:absolute;
    right:15px;
    top:40px;
    color:#777;
    cursor:pointer;
}

/* Options */
.options{
    display:flex;
    justify-content:space-between;
    font-size:13px;
    margin:15px 0 22px;
}

.options a{
    color:#1e5eff;
    text-decoration:none;
}

/* Login Button */
button{
    width:100%;
    height:48px;
    border:none;
    border-radius:12px;
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    background:linear-gradient(90deg,#063a8d,#2563eb);
    transition:.3s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 15px 25px rgba(37,99,235,.35);
}

/* Sign Up */
.signup{
    text-align:center;
    margin-top:18px;
    color:#555;
}

.signup a{
    color:#1e5eff;
    text-decoration:none;
    font-weight:600;
}

/* Responsive */
@media(max-width:900px){

.container{
    width:95%;
    height:auto;
    flex-direction:column;
}

.left,
.right{
    width:100%;
    padding:35px;
}

.logo{
    position:relative;
    top:0;
    left:0;
    margin-bottom:20px;
}

.image img{
    width:180px;
}

.card{
    width:100%;
    max-width:420px;
}
}
</style>
</head>

<body>

<div class="container">

    <!-- Left Side -->
    <div class="left">

        <div class="logo">
            <div class="logo-icon">
                <i class="fa-solid fa-book-open"></i>
            </div>

            <div class="logo-text">
                <h3>Smart Study Planner</h3>
                <p>Learn • Plan • Achieve</p>
            </div>
        </div>

        <div class="image">
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png" alt="Study Illustration">
        </div>

        <h2>Welcome Back</h2>

        <p>
            Continue your learning journey and manage your studies efficiently.
        </p>

    </div>

    <!-- Right Side -->
    <div class="right">

        <div class="card">
         <h1>Login</h1>
          
          

            <p class="subtitle">
                Sign in to continue your smart learning journey.
            </p>

            <div class="input-box">
                <label>Email or Username</label>
                <input type="text" placeholder="Enter your email or username">
            </div>

            <div class="input-box password">
                <label>Password</label>
                <input type="password" placeholder="Enter your password">
                <i class="fa-regular fa-eye"></i>
            </div>

            <div class="options">
                <label>
                    <input type="checkbox">
                    Remember Me
                </label>

                <a href="#">Forgot Password?</a>
            </div>
    <button type="button" onclick="window.location.href='dash.html'">
    Login
</button>
    
             

            <div class="signup">
                Don't have an account?
                <a href="Smart Study Planner - signIn.html">Create Account</a>
            
            </div>

        </div>

    </div>

</div>

</body>
</html>
